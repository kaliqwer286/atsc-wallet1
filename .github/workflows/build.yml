name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
      
      - name: Install buildozer
        run: |
          pip install buildozer cython
          buildozer init
      
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo 'count=0' > ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      
      - name: Build APK
        run: |
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: atsc-wallet
          path: bin/*.apk
