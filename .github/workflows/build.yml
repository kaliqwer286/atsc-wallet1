name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Build APK
        uses: digreatbrian/buildozer-action@v1
        with:
          command: buildozer android debug
          workdir: .
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: atsc-wallet
          path: bin/*.apk
