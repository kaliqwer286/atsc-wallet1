name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install buildozer
        run: |
          pip install buildozer cython
          buildozer init
      
      - name: Setup Android SDK
        run: |
          mkdir -p ~/.android
          echo 'count=0' > ~/.android/repositories.cfg
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d cmdline-tools
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          mv cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33"
      
      - name: Build APK
        run: buildozer android debug
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atsc-wallet
          path: bin/*.apk
