name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install buildozer
        run: |
          pip install buildozer cython
          buildozer init
      
      - name: Fix buildozer spec
        run: |
          sed -i 's/requirements = .*/requirements = python3,kivy,requests,websocket-client,Pillow/' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/' buildozer.spec
      
      - name: Build APK
        run: buildozer android debug
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atsc-wallet
          path: |
            bin/*.apk
            .buildozer/logs/*.log
